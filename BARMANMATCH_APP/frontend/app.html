<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BarmanMatch — Piattaforma</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a12;--bg2:#12121f;--bg3:#191926;--line:rgba(255,255,255,.08);--txt:#f4f0ff;--txt2:#b9b6cc;--txt3:#7a7790;
--vl:#a855f7;--vd:#7c3aed;--gl:#e0b84c;--teal:#0e9aa7;--green:#34d399;--red:#f87171;--orange:#fb923c}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',system-ui,sans-serif;background:var(--bg);color:var(--txt);font-size:14px;line-height:1.5;min-height:100dvh}
h1,h2,h3,.syne{font-family:'Syne',sans-serif}
a{color:var(--vl)}
button{font-family:inherit;cursor:pointer;border:none;transition:all .15s}
input,select,textarea{font-family:inherit;width:100%;background:var(--bg3);border:1px solid var(--line);border-radius:9px;padding:10px 12px;color:var(--txt);font-size:13.5px;outline:none;margin-top:4px}
input:focus,select:focus,textarea:focus{border-color:var(--vd)}
label{font-size:11px;color:var(--txt3);text-transform:uppercase;letter-spacing:.06em;font-weight:600}
.field{margin-bottom:12px}
.btn{background:linear-gradient(135deg,var(--vd),var(--vl));color:#fff;border-radius:9px;padding:10px 18px;font-weight:700;font-size:13.5px}
.btn:hover{opacity:.9}.btn.sm{padding:6px 12px;font-size:12px}
.btn.g{background:linear-gradient(135deg,#0e7490,#0e9aa7)}
.btn.gold{background:linear-gradient(135deg,#a98314,var(--gl));color:#1a1408}
.btn.ghost{background:transparent;border:1px solid var(--line);color:var(--txt2)}
.btn.ghost:hover{border-color:var(--vd);color:var(--txt)}
.btn.danger{background:transparent;border:1px solid rgba(248,113,113,.4);color:var(--red)}
.row{display:flex;gap:10px;flex-wrap:wrap}
.muted{color:var(--txt3);font-size:12.5px}
.card{background:var(--bg2);border:1px solid var(--line);border-radius:14px;padding:16px;margin-bottom:12px}
.pill{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:99px;font-size:11px;font-weight:700;border:1px solid}
.p-vl{background:rgba(168,85,247,.12);color:#c4a3f5;border-color:rgba(168,85,247,.3)}
.p-green{background:rgba(52,211,153,.12);color:var(--green);border-color:rgba(52,211,153,.3)}
.p-red{background:rgba(248,113,113,.12);color:var(--red);border-color:rgba(248,113,113,.3)}
.p-orange{background:rgba(251,146,60,.12);color:var(--orange);border-color:rgba(251,146,60,.3)}
.p-dim{background:var(--bg3);color:var(--txt3);border-color:var(--line)}
.p-gold{background:rgba(224,184,76,.12);color:var(--gl);border-color:rgba(224,184,76,.3)}
/* topbar */
.tb{position:sticky;top:0;z-index:30;display:flex;align-items:center;gap:12px;padding:12px 18px;background:rgba(10,10,18,.85);backdrop-filter:blur(10px);border-bottom:1px solid var(--line)}
.tb .brand{font-family:'Syne';font-weight:800;font-size:18px}
.tb .brand b{color:var(--vl)}
.tb .sp{flex:1}
.clean{font-size:10.5px}
.nav{display:flex;gap:4px;padding:10px 14px;overflow-x:auto;border-bottom:1px solid var(--line);background:var(--bg2);position:sticky;top:53px;z-index:20}
.nav button{background:transparent;color:var(--txt2);border:1px solid transparent;border-radius:8px;padding:7px 13px;font-size:12.5px;font-weight:600;white-space:nowrap}
.nav button.on{background:rgba(168,85,247,.14);color:#c4a3f5;border-color:rgba(168,85,247,.3)}
.wrap{max-width:920px;margin:0 auto;padding:18px}
.auth{max-width:420px;margin:5vh auto;padding:22px}
.tabs{display:flex;gap:6px;margin-bottom:16px}
.tabs button{flex:1;background:var(--bg3);border:1px solid var(--line);border-radius:9px;padding:9px;color:var(--txt2);font-weight:700;font-size:13px}
.tabs button.on{background:linear-gradient(135deg,var(--vd),var(--vl));color:#fff;border-color:transparent}
.score{font-family:'Syne';font-weight:800;font-size:20px}
.err{color:var(--red);font-size:12.5px;margin:6px 0}
.empty{text-align:center;color:var(--txt3);padding:30px;font-size:13px}
.hd{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;margin-bottom:8px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(10px);background:var(--bg3);border:1px solid var(--vd);color:var(--txt);padding:10px 18px;border-radius:10px;font-size:13px;font-weight:600;z-index:9999;opacity:0;transition:all .25s;pointer-events:none;max-width:90vw;text-align:center}
@media(max-width:560px){.grid2{grid-template-columns:1fr}}
</style>
</head>
<body>
<div id="app"></div>
<div id="toast"></div>

<script>
//──────────────── infra ────────────────
const API = window.BMM_API || (location.protocol==='file:' ? 'http://localhost:8000'
  : (location.hostname==='localhost'||location.hostname==='127.0.0.1') ? 'http://'+location.hostname+':8000' : '');
const LS='bmm_session';
function session(){ try{return JSON.parse(localStorage.getItem(LS));}catch(e){return null;} }
function setSession(s){ localStorage.setItem(LS, JSON.stringify(s)); }
function logout(){ localStorage.removeItem(LS); location.hash=''; render(); }
function esc(s){ return (s==null?'':String(s)).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function toast(m){ var t=document.getElementById('toast'); t.textContent=m; t.style.opacity='1'; t.style.transform='translateX(-50%) translateY(0)'; clearTimeout(t._t); t._t=setTimeout(function(){t.style.opacity='0';t.style.transform='translateX(-50%) translateY(10px)';},3200); }
function csv(s){ return (s||'').split(',').map(function(x){return x.trim();}).filter(Boolean); }
function eur(n){ return '€'+(Number(n)||0).toLocaleString('it-IT',{minimumFractionDigits:2,maximumFractionDigits:2}); }
function dt(d){ return d? new Date(d).toLocaleDateString('it-IT'):'—'; }
function hhmm(t){ return t? String(t).slice(0,5):'—'; }

async function api(path, opts){
  opts=opts||{}; var s=session();
  opts.headers=Object.assign({'Content-Type':'application/json'}, opts.headers||{});
  if(s&&s.token) opts.headers['Authorization']='Bearer '+s.token;
  var r=await fetch(API+path, opts);
  var data=null; try{ data=await r.json(); }catch(e){}
  return {ok:r.ok, status:r.status, data:data};
}
function val(id){ var e=document.getElementById(id); return e?e.value.trim():''; }
function chk(id){ var e=document.getElementById(id); return !!(e&&e.checked); }

var WAGE=null;
async function loadWage(){ if(WAGE) return WAGE; var r=await api('/api/policy/wage-floor'); WAGE=r.ok?r.data:{min_hourly:{},default:8.5}; return WAGE; }

//──────────────── auth ────────────────
function renderAuth(){
  var role=(location.hash.replace('#','')||'worker'); if(role!=='venue') role='worker';
  var app=document.getElementById('app');
  app.innerHTML=
   '<div class="auth">'
   +'<div style="text-align:center;margin-bottom:18px"><div class="syne" style="font-weight:800;font-size:26px">Barman<span style="color:var(--vl)">Match</span></div>'
   +'<div class="muted" style="font-size:11px;letter-spacing:.2em;text-transform:uppercase">Hospitality Staffing · pulito & tracciato</div></div>'
   +'<div class="tabs"><button id="t-w" class="'+(role==='worker'?'on':'')+'">👤 Lavoratore</button><button id="t-v" class="'+(role==='venue'?'on':'')+'">🏨 Struttura</button></div>'
   +'<div class="card">'
   +'<div class="tabs" style="margin-bottom:14px"><button id="m-login" class="on">Accedi</button><button id="m-reg">Registrati</button></div>'
   +'<div class="field"><label>Email</label><input id="a-email" type="email" placeholder="tu@email.it"></div>'
   +'<div class="field"><label>Password</label><input id="a-pwd" type="password" placeholder="••••••••"></div>'
   +'<div id="a-err" class="err" style="display:none"></div>'
   +'<button id="a-go" class="btn" style="width:100%">Accedi come '+(role==='venue'?'struttura':'lavoratore')+'</button>'
   +'<div class="muted" style="text-align:center;margin-top:10px;font-size:11.5px">🔒 Niente pagamenti in nero · niente turni sottopagati</div>'
   +'</div></div>';
  var mode='login';
  document.getElementById('t-w').onclick=function(){location.hash='worker';};
  document.getElementById('t-v').onclick=function(){location.hash='venue';};
  function setMode(m){ mode=m; document.getElementById('m-login').classList.toggle('on',m==='login'); document.getElementById('m-reg').classList.toggle('on',m==='register'); document.getElementById('a-go').textContent=(m==='login'?'Accedi':'Registrati')+' come '+(role==='venue'?'struttura':'lavoratore'); }
  document.getElementById('m-login').onclick=function(){setMode('login');};
  document.getElementById('m-reg').onclick=function(){setMode('register');};
  document.getElementById('a-go').onclick=async function(){
    var em=val('a-email'), pw=val('a-pwd'), err=document.getElementById('a-err');
    err.style.display='none';
    if(!em||!pw){ err.textContent='Inserisci email e password'; err.style.display='block'; return; }
    var path=mode==='login'?'/api/auth/login':'/api/auth/register';
    var r=await api(path,{method:'POST',body:JSON.stringify({email:em,password:pw,role:role})});
    if(!r.ok){ err.textContent=(r.data&&(r.data.detail||r.data.message))||'Errore'; err.style.display='block'; return; }
    if(mode==='register'){ toast('✅ Registrato! Ora accedi.'); setMode('login'); return; }
    setSession({token:r.data.access_token, user_id:r.data.user_id, role:r.data.role||role, email:em});
    location.hash=''; render();
  };
}

//──────────────── shell ────────────────
function shell(role, navHTML, bodyHTML){
  var s=session();
  return '<div class="tb"><div class="brand">Barman<b>Match</b></div>'
    +'<span class="pill p-green clean">🔒 piattaforma pulita</span><div class="sp"></div>'
    +'<span class="pill '+(role==='venue'?'p-gold':'p-vl')+'">'+(role==='venue'?'🏨 Struttura':'👤 Lavoratore')+'</span>'
    +'<span class="muted" style="font-size:11.5px">'+esc((s&&s.email)||'')+'</span>'
    +'<a href="../../../SKILLSOLUTIONS.COM/index.html" class="btn ghost sm" title="Torna all\'ecosistema SkillSolutions" style="text-decoration:none">✦ Hub</a>'
    +'<button class="btn ghost sm" id="logout">Esci</button></div>'
    +'<div class="nav">'+navHTML+'</div><div class="wrap">'+bodyHTML+'</div>';
}
function wireShell(){ var l=document.getElementById('logout'); if(l) l.onclick=logout; }
var TAB={worker:'shifts', venue:'shifts'};

//──────────────── render router ────────────────
async function render(){
  var s=session();
  if(!s){ renderAuth(); return; }
  if(s.role==='venue') await renderVenue(); else await renderWorker();
  wireShell();
}
window.addEventListener('hashchange', function(){ if(!session()) renderAuth(); });

//──────────────── WORKER ────────────────
async function renderWorker(){
  var prof=await api('/api/workers/profile/me');
  if(prof.status===404){ return renderWorkerOnboard(); }
  var tab=TAB.worker;
  var nav=['shifts|🎯 Turni per te','apps|📨 Candidature','contracts|📑 Contratti','profile|👤 Profilo']
    .map(function(x){var p=x.split('|');return '<button data-tab="'+p[0]+'" class="'+(tab===p[0]?'on':'')+'">'+p[1]+'</button>';}).join('');
  var body='<div id="tabbody"><div class="empty">Carico…</div></div>';
  document.getElementById('app').innerHTML=shell('worker',nav,body);
  document.querySelectorAll('.nav [data-tab]').forEach(function(b){ b.onclick=function(){ TAB.worker=b.dataset.tab; render(); }; });
  if(tab==='shifts') workerShifts();
  else if(tab==='apps') workerApps();
  else if(tab==='contracts') workerContracts(prof.data);
  else workerProfile(prof.data);
}
function renderWorkerOnboard(){
  document.getElementById('app').innerHTML=shell('worker','<button class="on">👤 Crea profilo</button>',
    '<div class="card"><h2 style="margin-bottom:4px">Crea il tuo profilo</h2><p class="muted" style="margin-bottom:14px">Così i locali ti trovano e il matching funziona.</p>'
    +'<div class="field"><label>Nome e cognome *</label><input id="w-name"></div>'
    +'<div class="grid2"><div class="field"><label>Città *</label><input id="w-city" placeholder="Cagliari"></div><div class="field"><label>Telefono</label><input id="w-phone"></div></div>'
    +'<div class="field"><label>Ruoli * (separati da virgola)</label><input id="w-roles" placeholder="bartender, cameriere"></div>'
    +'<div class="field"><label>Competenze (virgola)</label><input id="w-skills" placeholder="cocktail, caffetteria, HACCP"></div>'
    +'<div class="grid2"><div class="field"><label>Anni esperienza</label><input id="w-exp" type="number" value="0"></div><div class="field"><label>Tariffa minima €/h</label><input id="w-rate" type="number" placeholder="10"></div></div>'
    +'<div class="field"><label>Bio</label><textarea id="w-bio" rows="2"></textarea></div>'
    +'<div id="w-err" class="err" style="display:none"></div><button id="w-save" class="btn">Salva profilo</button></div>');
  wireShell();
  document.getElementById('w-save').onclick=async function(){
    var err=document.getElementById('w-err'); err.style.display='none';
    if(!val('w-name')||!val('w-city')||!val('w-roles')){ err.textContent='Nome, città e almeno un ruolo sono obbligatori'; err.style.display='block'; return; }
    var b={full_name:val('w-name'),city:val('w-city'),phone:val('w-phone')||null,roles:csv(val('w-roles')),skills:csv(val('w-skills')),certifications:[],years_experience:parseInt(val('w-exp'))||0,bio:val('w-bio')||null,hourly_rate_min:parseFloat(val('w-rate'))||null};
    var r=await api('/api/workers/profile',{method:'POST',body:JSON.stringify(b)});
    if(r.ok){ toast('✅ Profilo creato'); render(); } else { err.textContent=(r.data&&r.data.detail)||'Errore'; err.style.display='block'; }
  };
}
var WS_ROWS=[];
async function workerShifts(){
  var box=document.getElementById('tabbody');
  var r=await api('/api/matching/worker/shifts');
  if(!r.ok){ box.innerHTML='<div class="empty">Errore nel caricamento.</div>'; return; }
  WS_ROWS=r.data||[];
  box.innerHTML=
    '<div class="card" style="position:sticky;top:98px;z-index:10"><div class="row">'
    +'<input id="f-city" placeholder="📍 Città" style="flex:1;min-width:110px">'
    +'<input id="f-role" placeholder="🔎 Ruolo" style="flex:1;min-width:110px">'
    +'<select id="f-sort" style="flex:1;min-width:140px"><option value="match">Ordina: Miglior match</option><option value="pay">Paga più alta</option><option value="date">Data più vicina</option></select>'
    +'</div><div class="muted" id="f-count" style="margin-top:6px"></div></div>'
    +'<div id="ws-list"></div>';
  ['f-city','f-role'].forEach(function(id){ document.getElementById(id).addEventListener('input',wsRender); });
  document.getElementById('f-sort').addEventListener('change',wsRender);
  wsRender();
}
function wsRender(){
  var city=(val('f-city')||'').toLowerCase(), role=(val('f-role')||'').toLowerCase(), sort=val('f-sort')||'match';
  var rows=WS_ROWS.filter(function(s){ return (!city||(s.city||'').toLowerCase().indexOf(city)>=0) && (!role||(s.role||'').toLowerCase().indexOf(role)>=0); });
  rows.sort(function(a,b){
    if(sort==='pay') return (b.hourly_rate||0)-(a.hourly_rate||0);
    if(sort==='date') return String(a.date||'').localeCompare(String(b.date||''));
    return (b.match_score||0)-(a.match_score||0);
  });
  var cnt=document.getElementById('f-count'); if(cnt) cnt.textContent=rows.length+' turni'+(WS_ROWS.length!==rows.length?(' su '+WS_ROWS.length):'')+' disponibili';
  var list=document.getElementById('ws-list');
  list.innerHTML = rows.length ? rows.map(bookingShiftCard).join('') : '<div class="empty">Nessun turno con questi filtri.</div>';
  list.querySelectorAll('[data-act="apply"]').forEach(function(b){ b.onclick=async function(){
    var r=await api('/api/shifts/'+b.dataset.id+'/apply',{method:'POST',body:JSON.stringify({contract_accepted:true})});
    if(r.ok){ toast('✅ Candidatura inviata'); workerShifts(); } else toast((r.data&&r.data.detail)||'Errore');
  };});
}
function scoreBadge(score){
  var s=Number(score)||0;
  var lbl=s>=85?'Ottimo match':s>=70?'Buon match':s>=50?'Discreto':'Base';
  var col=s>=85?'var(--green)':s>=70?'var(--teal)':s>=50?'var(--orange)':'var(--txt3)';
  return '<div style="display:flex;align-items:center;gap:8px"><div style="background:'+col+';color:#08121a;font-family:Syne;font-weight:800;font-size:15px;padding:6px 9px;border-radius:8px 8px 8px 2px;min-width:34px;text-align:center">'+s+'</div><div style="font-size:11px;color:'+col+';font-weight:700;line-height:1.2">'+lbl+'</div></div>';
}
function bookingShiftCard(s){
  var v=s.venue_profiles||{};
  var cues=[];
  if(s.is_urgent) cues.push('<span class="pill p-red">🔥 Urgente</span>');
  if((s.match_score||0)>=85) cues.push('<span class="pill p-gold">Molto richiesto</span>');
  cues.push('<span class="pill p-dim">'+(s.spots>1?(s.spots+' posti'):'1 posto')+'</span>');
  return '<div class="card"><div class="hd">'
    +'<div><b style="font-size:15px">'+esc(s.role)+'</b><div class="muted">'+esc(v.name||'Struttura')+' · 📍 '+esc(s.city)+'</div></div>'
    +scoreBadge(s.match_score)+'</div>'
    +'<div class="row" style="margin:8px 0">'+cues.join('')+'</div>'
    +'<div class="muted">📅 '+dt(s.date)+' · '+hhmm(s.start_time)+'–'+hhmm(s.end_time)+'</div>'
    +'<div style="font-family:Syne;font-weight:800;font-size:19px;margin:6px 0;color:var(--gl)">'+eur(s.hourly_rate)+'<span style="font-size:12px;color:var(--txt3);font-family:DM Sans">/ora</span></div>'
    +'<div class="muted" style="font-size:11.5px;color:var(--green)">🔒 pagamento garantito in escrow · ✓ tariffa a norma CCNL</div>'
    +(s.requirements&&s.requirements.length?'<div class="muted" style="margin-top:4px">Richiesto: '+s.requirements.map(esc).join(', ')+'</div>':'')
    +(s.description?'<div style="margin-top:6px">'+esc(s.description)+'</div>':'')
    +'<div class="row" style="margin-top:10px">'+(s.already_applied?'<span class="pill p-green">✓ Già candidato</span>':'<button class="btn" data-act="apply" data-id="'+s.id+'">Candidati ora</button>')+'</div></div>';
}
async function workerApps(){
  var box=document.getElementById('tabbody');
  var r=await api('/api/workers/applications'); var rows=r.ok?(r.data||[]):[];
  if(!rows.length){ box.innerHTML='<div class="empty">Nessuna candidatura.</div>'; return; }
  box.innerHTML=rows.map(function(a){
    var sh=a.shifts||{}, v=sh.venue_profiles||{};
    return '<div class="card"><div class="hd"><div><b>'+esc(sh.role||'')+'</b> · '+esc(v.name||'')+'</div>'+statusPill(a.status)+'</div>'
      +'<div class="muted">📅 '+dt(sh.date)+' · '+hhmm(sh.start_time)+'–'+hhmm(sh.end_time)+' · '+eur(sh.hourly_rate)+'/h</div></div>';
  }).join('');
}
async function workerContracts(prof){
  var box=document.getElementById('tabbody');
  var r=await api('/api/contracts/mine'); var rows=r.ok?(r.data||[]):[];
  rows=rows.filter(function(c){return c.worker_id===session().user_id;});
  if(!rows.length){ box.innerHTML='<div class="empty">Nessun contratto. Quando una struttura ti conferma, qui troverai il contratto da firmare.</div>'; return; }
  box.innerHTML=rows.map(contractCard.bind(null,'worker')).join('');
  bindContractActions(function(){ workerContracts(prof); });
}
function workerProfile(p){
  var box=document.getElementById('tabbody');
  box.innerHTML='<div class="card"><h2>'+esc(p.full_name)+'</h2>'
    +'<div class="muted">'+esc(p.city)+' · '+(p.roles||[]).map(esc).join(', ')+'</div>'
    +'<div class="row" style="margin-top:10px">'+ratingPills(p)+'</div>'
    +(p.bio?'<p style="margin-top:10px">'+esc(p.bio)+'</p>':'')
    +'<div class="muted" style="margin-top:10px">Competenze: '+((p.skills||[]).map(esc).join(', ')||'—')+'</div></div>'
    +'<div class="card"><div class="hd"><b>💳 Pagamenti</b></div><div id="pay-status" class="muted">Verifico…</div><button id="pay-onboard" class="btn g sm" style="margin-top:8px;display:none">Configura i pagamenti</button></div>';
  api('/api/payments/connect/status').then(function(r){
    var st=document.getElementById('pay-status'), bt=document.getElementById('pay-onboard'); if(!st) return;
    var d=r.data||{};
    if(!d.enabled){ st.innerHTML='Pagamenti gestiti in <b>escrow</b> dalla piattaforma: niente contante, compenso garantito a turno completato.'; return; }
    if(d.ready){ st.innerHTML='✅ Conto pagamenti collegato — pronto a ricevere i compensi.'; }
    else { st.innerHTML='⚠️ Collega il tuo conto per ricevere i compensi in modo tracciato e sicuro.'; if(bt) bt.style.display=''; }
  }).catch(function(){ var st=document.getElementById('pay-status'); if(st) st.textContent=''; });
  var btn=document.getElementById('pay-onboard'); if(btn) btn.onclick=async function(){
    var r=await api('/api/payments/connect/onboard',{method:'POST',body:JSON.stringify({})});
    if(r.ok && r.data && r.data.url){ location.href=r.data.url; } else toast((r.data&&r.data.detail)||'Pagamenti non attivi');
  };
}

//──────────────── VENUE ────────────────
async function renderVenue(){
  var prof=await api('/api/venues/profile/me');
  if(prof.status===404){ return renderVenueOnboard(); }
  var tab=TAB.venue;

  act('fund', function(id){return '/api/contracts/'+id+'/fund';}, '🔒 Pagamento in escrow');
  act('complete', function(id){return '/api/contracts/'+id+'/complete';}, '✅ Turno completato, worker pagato');
  act('cancel', function(id){return '/api/contracts/'+id+'/cancel';}, 'Contratto annullato');
}

render();
</script>
</body>
</html>
